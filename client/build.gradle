plugins {
    id 'java'
    id 'application'

    id 'org.openjfx.javafxplugin' version '0.1.0'
    id 'org.beryx.jlink' version '3.2.1'

    id 'com.google.protobuf' version '0.9.6'

    // Updated to the modern namespace and version for Strategy 2
    id 'org.gradlex.extra-java-module-info' version '1.14'
}

group = 'com.philstar'
version = '0.99'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(25)
    }
}

repositories {
    mavenCentral()
}

// ---------------------------------------------------------------------------
// Versions
// ---------------------------------------------------------------------------
ext {
    grpcVersion      = '1.69.1'
    protobufVersion  = '3.25.8'
    javafxVersion    = '21.0.2'
}

// ---------------------------------------------------------------------------
// JavaFX modules
// ---------------------------------------------------------------------------
javafx {
    version = javafxVersion
    modules = ['javafx.controls', 'javafx.fxml']
}

// ---------------------------------------------------------------------------
// Dependencies
// ---------------------------------------------------------------------------
dependencies {
    runtimeOnly "io.grpc:grpc-netty-shaded:${grpcVersion}"
    implementation "io.grpc:grpc-protobuf:${grpcVersion}"
    implementation "io.grpc:grpc-stub:${grpcVersion}"

    // Explicitly add grpc-api so the compiler and patcher don't lose it
    implementation "io.grpc:grpc-api:${grpcVersion}"

    implementation "com.google.protobuf:protobuf-java:${protobufVersion}"
    implementation 'org.apache.tomcat:annotations-api:6.0.53'
    implementation 'ch.qos.logback:logback-classic:1.5.32'

    testImplementation 'org.junit.jupiter:junit-jupiter:5.10.2'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

// Prevent split-package JPMS crashes by banishing the ancient jsr305 library
configurations.all {
    exclude group: 'com.google.code.findbugs', module: 'jsr305'
}

// ---------------------------------------------------------------------------
// Protobuf code generation
// ---------------------------------------------------------------------------
protobuf {
    protoc {
        artifact = "com.google.protobuf:protoc:${protobufVersion}"
    }
    plugins {
        grpc {
            artifact = "io.grpc:protoc-gen-grpc-java:${grpcVersion}"
        }
    }
    generateProtoTasks {
        all()*.plugins {
            grpc {}
        }
    }
}

// Point protobuf plugin at the shared proto directory
sourceSets {
    main {
        proto {
            srcDir '../proto'
        }
        java {
            // Include generated gRPC/protobuf sources
            srcDirs += [
                    'build/generated/sources/proto/main/grpc',
                    'build/generated/sources/proto/main/java'
            ]
        }
    }
}

// ---------------------------------------------------------------------------
// Modular Patching (Strategy 2)
// ---------------------------------------------------------------------------
extraJavaModuleInfo {
    failOnMissingModuleInfo = false

    // 1. Create one giant host module and name it whatever you want
    module("io.grpc:grpc-api", "io.grpc") {

        // 2. Swallow every other gRPC and Protobuf JAR into this one
        mergeJar("io.grpc:grpc-context")
        mergeJar("io.grpc:grpc-core")
        mergeJar("io.grpc:grpc-netty-shaded")
        mergeJar("io.grpc:grpc-protobuf")
        mergeJar("io.grpc:grpc-stub")
        mergeJar("io.grpc:grpc-util")
        mergeJar("io.grpc:grpc-protobuf-lite")
        mergeJar("com.google.protobuf:protobuf-java")
        mergeJar("com.google.api.grpc:proto-google-common-protos")

        // 3. Swallow the annoying transitive dependencies too
        mergeJar("com.google.guava:guava")
        mergeJar("com.google.guava:failureaccess")
        mergeJar("com.google.guava:listenablefuture")
        mergeJar("io.perfmark:perfmark-api")
        // ... add any others that pop up

        // 4. Export everything and DO NOT use requireAllDefinedDependencies()
        exportAllPackages()

        // FIX: Tell the module system to ignore the missing BlockHound optional dependency
        ignoreServiceProvider("reactor.blockhound.integration.BlockHoundIntegration")

        // FIX: Explicitly grant the mega-module access to the built-in JDK modules it needs
        requires("java.logging")
        requires("java.naming")       // Required by gRPC for DNS name resolution
        requires("jdk.unsupported")   // Required by Netty for sun.misc.Unsafe memory access

        // FIX: Explicitly grant gRPC permission to dynamically load its own network providers
        uses("io.grpc.ManagedChannelProvider")
        uses("io.grpc.NameResolverProvider")
        uses("io.grpc.LoadBalancerProvider")
        uses("io.grpc.ServerProvider") // Optional for clients, but good to have just in case
    }

    // You still leave Tomcat Annotations separate because it's unrelated
    // Add these minor stragglers so Beryx doesn't try to merge them!
    module("org.apache.tomcat:annotations-api", "tomcat.annotations.api") { exportAllPackages() }

    module("com.google.android:annotations", "com.google.android.annotations") { exportAllPackages() }
    module("org.codehaus.mojo:animal-sniffer-annotations", "animal_sniffer.annotations") { exportAllPackages() }
}

// ---------------------------------------------------------------------------
// Application entry point
// ---------------------------------------------------------------------------
application {
    mainModule = 'com.philstar.stargate'
    mainClass  = 'com.philstar.stargate.Main'
}

// Ensure JavaFX is properly added to the module path when running via Gradle
run {
    doFirst {
        jvmArgs = [
                '--module-path', classpath.asPath,
                '--add-modules', 'javafx.controls,javafx.fxml'
        ]
    }
}

// ---------------------------------------------------------------------------
// Test
// ---------------------------------------------------------------------------
test {
    useJUnitPlatform()
}

// ---------------------------------------------------------------------------
// jlink & jpackage (Pure Modular Configuration)
// ---------------------------------------------------------------------------
jlink {
    options = ['--strip-debug', '--compress', '2', '--no-header-files', '--no-man-pages']

    launcher {
        name    = 'stargate'
        jvmArgs = ['-Dfile.encoding=UTF-8']
    }

    // Notice how clean this is now! No mergedModule block, no jarExcludes.
    // The Beryx plugin simply passes the patched modules directly to the JDK.

    jpackage {
        imageName      = 'StarGate'
        installerName  = 'StarGate-Setup'
        appVersion     = project.version.toString().replace('-SNAPSHOT', '')
        vendor         = 'Philstar Hosiery, Inc.'
        installerType  = 'msi'
        icon           = 'src/main/resources/com/philstar/stargate/app.ico'

        installerOptions = [
                '--win-per-user-install',
                '--win-dir-chooser',
                '--win-menu',
                '--win-shortcut',
        ]
    }
}


tasks.register("listNonModularJars") {
    doLast {
        println "--- Scanning for legacy JARs triggering Beryx ---"
        configurations.runtimeClasspath.files.findAll { it.name.endsWith('.jar') }.each { file ->
            try (java.util.jar.JarFile jar = new java.util.jar.JarFile(file)) {
                boolean hasModuleInfo = jar.getEntry("module-info.class") != null ||
                        jar.stream().anyMatch { it.name.matches("META-INF/versions/\\d+/module-info\\.class") }
                if (!hasModuleInfo) {
                    println "❌ Found legacy JAR: ${file.name}"
                }
            } catch (Exception e) {}
        }
        println "---------------------------------------------------"
    }
}